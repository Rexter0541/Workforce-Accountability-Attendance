name: report_app
description: Bobonan Community Report App
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages compatible together
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.1.3

  # Image picking
  image_picker: ^1.1.2

  # Geolocation
  geolocator: ^12.0.0

  # iOS style icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true